services:
  hexbot:
    build: .
    restart: unless-stopped
    ports:
      - '49152-49171:49152-49171'
    volumes:
      - ./config:/app/config:ro
      - ./plugins:/app/plugins:ro
      - ./data:/app/data
    healthcheck:
      # `-connected` is a presence signal, not a heartbeat: touched once on
      # bot:connected, removed on bot:disconnected. Check existence only — a
      # freshness window would go stale ~120s after connect on a stable link
      # (the file's mtime never advances) and falsely report unhealthy.
      test: ['CMD', 'sh', '-c', '[ -f /tmp/.hexbot-connected ]']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
